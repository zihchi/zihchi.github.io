<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人專屬 - Lido 航班精準擷取系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(51, 65, 85, 0.8); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(71, 85, 105, 1); }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen font-sans flex items-center justify-center p-2 md:p-4">

    <div id="toast" class="fixed top-5 right-5 transform transition-transform translate-x-full opacity-0 bg-blue-600 text-white px-6 py-3 rounded shadow-lg z-50">訊息提示</div>

    <!-- 階段一：網頁鎖定畫面 -->
    <div id="lock-screen" class="w-full max-w-md glass-panel p-8 rounded-2xl shadow-2xl text-center transition-opacity duration-500">
        <svg class="w-16 h-16 mx-auto mb-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        <h2 class="text-2xl font-bold mb-6 tracking-wider">系統已鎖定</h2>
        <input type="password" id="page-password" placeholder="請輸入網頁密碼" class="w-full px-4 py-3 mb-4 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-center tracking-[0.5em] transition-all">
        <button id="unlock-btn" class="w-full px-4 py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg transition-colors">解鎖系統</button>
    </div>

    <!-- 階段二：Lido 憑證登入畫面 -->
    <div id="lido-login-screen" class="w-full max-w-md glass-panel p-8 rounded-2xl shadow-2xl text-center transition-opacity duration-500 hidden">
        <svg class="w-16 h-16 mx-auto mb-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <h2 class="text-2xl font-bold mb-6 tracking-wider">Lido 伺服器驗證</h2>
        <p class="text-sm text-slate-400 mb-6">請輸入 Lido 帳密，系統將於背景保持連線狀態。</p>
        <input type="text" id="lido-user" class="w-full px-4 py-3 mb-4 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-center transition-all" placeholder="Username">
        <input type="password" id="lido-pass" class="w-full px-4 py-3 mb-6 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-center transition-all" placeholder="Password">
        <button id="lido-connect-btn" class="w-full px-4 py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-lg transition-colors shadow-lg shadow-emerald-900/50">建立背景連線</button>
    </div>

    <!-- 階段三：主程式戰情室 -->
    <div id="main-app" class="w-full max-w-6xl glass-panel p-6 md:p-8 rounded-2xl shadow-2xl transition-opacity duration-500 hidden flex flex-col md:h-[90vh]">
        <div class="flex items-center justify-between mb-6 border-b border-slate-700 pb-4 shrink-0">
            <h1 class="text-2xl font-bold flex items-center text-blue-400 tracking-wide">
                <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Lido 勤務戰情室
            </h1>
            <button id="lock-again-btn" class="text-sm text-slate-400 hover:text-white transition-colors flex items-center">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                清除憑證並鎖定
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-8 flex-grow overflow-hidden">
            <!-- 左側：目標鎖定區 -->
            <div class="md:col-span-4 border-b md:border-b-0 md:border-r border-slate-700 pb-6 md:pb-0 md:pr-8 flex flex-col shrink-0">
                <div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700/50 shadow-inner">
                    <label class="block text-sm font-bold text-slate-300 mb-3 tracking-wide">目標航班鎖定</label>
                    <div class="flex shadow-sm rounded-lg overflow-hidden border border-slate-600 focus-within:border-emerald-500 focus-within:ring-1 focus-within:ring-emerald-500 transition-all">
                        <span class="inline-flex items-center px-4 text-sm text-slate-400 bg-slate-800 font-bold tracking-widest border-r border-slate-700">SJX</span>
                        <input type="text" id="target-flight" class="w-full px-4 py-3 bg-slate-900 focus:outline-none text-emerald-400 font-bold text-xl tracking-widest" placeholder="例如: 805" autocomplete="off">
                    </div>
                    <p class="text-xs text-slate-500 mt-3 leading-relaxed">
                        Lido 憑證已安全掛載。請直接輸入數字進行連續狙擊，無須重複登入。
                    </p>
                </div>
                
                <button id="fetch-data-btn" class="w-full py-4 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold tracking-widest rounded-xl shadow-lg shadow-emerald-900/30 transition-all transform hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center mt-6">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                    <span>發動精準擷取</span>
                    <svg id="loading-spinner" class="animate-spin ml-3 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
            </div>

            <!-- 右側：專業數據展示區 -->
            <div class="md:col-span-8 flex flex-col h-[60vh] md:h-full overflow-hidden space-y-6">
                
                <!-- 區塊一：專業視覺化儀表板 -->
                <div class="flex-grow flex flex-col min-h-0 bg-slate-950/50 rounded-xl border border-slate-700/50 shadow-inner overflow-hidden relative group">
                    <div class="bg-slate-800/80 px-5 py-3 border-b border-slate-700 flex justify-between items-center z-10 sticky top-0 backdrop-blur-sm">
                        <span class="font-bold text-slate-300 text-sm tracking-widest flex items-center">
                            <svg class="w-4 h-4 mr-2 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            勤務專屬結構化數據
                        </span>
                        <button id="copy-btn-main" class="flex items-center text-xs font-bold text-emerald-400 hover:text-white bg-emerald-900/30 hover:bg-emerald-600 px-3 py-1.5 rounded transition-colors hidden border border-emerald-700/50">
                            <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            複製文字 (Word)
                        </button>
                    </div>
                    
                    <div id="visual-dashboard" class="p-5 overflow-y-auto w-full h-full font-mono text-sm space-y-6">
                        <div class="flex h-full items-center justify-center text-slate-600 text-base tracking-widest">等待目標輸入...</div>
                    </div>
                    
                    <textarea id="hidden-raw-text" class="hidden"></textarea>
                </div>

                <!-- 區塊二：ATC Flight Plan -->
                <div class="h-32 md:h-40 shrink-0 flex flex-col bg-slate-950/50 rounded-xl border border-slate-700/50 shadow-inner overflow-hidden relative">
                    <div class="bg-slate-800/80 px-4 py-2.5 border-b border-slate-700 flex justify-between items-center z-10 sticky top-0 backdrop-blur-sm">
                        <span class="font-bold text-slate-400 text-xs tracking-widest">ATC Flight Plan (FPL)</span>
                        <button id="copy-btn-atc" class="flex items-center text-xs font-bold text-blue-400 hover:text-white bg-blue-900/30 hover:bg-blue-600 px-2.5 py-1 rounded transition-colors hidden border border-blue-700/50">
                            <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            複製 FPL
                        </button>
                    </div>
                    <textarea id="atc-display" readonly class="w-full h-full p-4 bg-transparent text-blue-300/80 font-mono text-xs focus:outline-none resize-none leading-relaxed" placeholder="ATC 報文將顯示於此..."></textarea>
                </div>

            </div>
        </div>
    </div>

    <script>
        const getSecKey = () => [49, 48, 52, 55, 56, 56].map(c => String.fromCharCode(c)).join('');
        // ★ 確保這裡是您部署的有效 GAS 網址 ★
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyLBXn_g6i-syghx1B3j-Ehz9mPuW1ByAGWc7j2rm45g6EGG3zbSLSoVvqudNpMG0E5-w/exec'; 

        const airportMap = {
            'RCTP':'TPE', 'RCKH':'KHH', 'RCSS':'TSA', 'RMQ':'RMQ',
            'VMMC':'MFM', 'VHHH':'HKG',
            'RJAA':'NRT', 'RJTT':'HND', 'RJBB':'KIX', 'RJGG':'NGO', 'RJFF':'FUK', 'ROAH':'OKA', 'RJSS':'SDJ', 'RJCC':'CTS', 'RJCH':'HKD', 'RJFU':'NGS', 'RJOA':'HIJ', 'RJSN':'KIJ', 'RJFK':'KOJ',
            'KSFO':'SFO', 'KLAX':'LAX', 'KSEA':'SEA', 'KOAK':'OAK', 'KSMF':'SMF', 'KONT':'ONT', 'KPDX':'PDX', 'PANC':'ANC', 'PMDY':'MDY', 'PHNL':'HNL',
            'RPLL':'MNL', 'RPVM':'CEB', 'RPLC':'CRK',
            'VVNB':'HAN', 'VVTS':'SGN', 'VVDN':'DAD', 'VVCR':'CXR', 'VVPQ':'PQC',
            'VTBS':'BKK', 'VTBD':'DMK', 'VTSG':'HKT', 'VTCC':'CNX',
            'WMKK':'KUL', 'WMKP':'PEN', 'WSSS':'SIN',
            'WIII':'CGK', 'WADD':'DPS'
        };
        const getAirportStr = (icao) => icao && airportMap[icao] ? `${icao}/${airportMap[icao]}` : icao;

        let savedLidoUser = '';
        let savedLidoPass = '';

        const lockScreen = document.getElementById('lock-screen');
        const lidoLoginScreen = document.getElementById('lido-login-screen');
        const mainApp = document.getElementById('main-app');
        const pagePwdInput = document.getElementById('page-password');
        const toast = document.getElementById('toast');

        function showToast(msg, isError = false, duration = 3000) {
            toast.textContent = msg;
            toast.className = `fixed top-5 right-5 transform transition-transform duration-300 shadow-lg z-50 px-6 py-3 rounded text-white ${isError ? 'bg-red-600' : 'bg-blue-600'}`;
            toast.classList.remove('translate-x-full', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-x-full', 'opacity-0'), duration);
        }

        function attemptUnlock() {
            if (pagePwdInput.value === getSecKey()) {
                lockScreen.classList.add('hidden');
                lidoLoginScreen.classList.remove('hidden');
                pagePwdInput.value = '';
            } else {
                showToast('登入授權碼無效', true);
                pagePwdInput.value = '';
            }
        }
        document.getElementById('unlock-btn').addEventListener('click', attemptUnlock);
        pagePwdInput.addEventListener('keypress', e => { if (e.key === 'Enter') attemptUnlock(); });

        document.getElementById('lido-connect-btn').addEventListener('click', () => {
            const user = document.getElementById('lido-user').value.trim();
            const pass = document.getElementById('lido-pass').value.trim();
            if (!user || !pass) return showToast('請完整輸入帳戶憑證', true);
            
            savedLidoUser = user;
            savedLidoPass = pass;
            lidoLoginScreen.classList.add('hidden');
            mainApp.classList.remove('hidden');
            document.getElementById('target-flight').focus();
            showToast('連線模組就緒，可開始連續查詢');
        });

        document.getElementById('lock-again-btn').addEventListener('click', () => {
            savedLidoUser = '';
            savedLidoPass = '';
            document.getElementById('lido-user').value = '';
            document.getElementById('lido-pass').value = '';
            mainApp.classList.add('hidden');
            lockScreen.classList.remove('hidden');
            document.getElementById('visual-dashboard').innerHTML = '<div class="flex h-full items-center justify-center text-slate-600 font-mono text-base tracking-widest">系統已休眠...</div>';
            document.getElementById('hidden-raw-text').value = '';
            document.getElementById('atc-display').value = '';
            document.getElementById('copy-btn-main').classList.add('hidden');
            document.getElementById('copy-btn-atc').classList.add('hidden');
            showToast('已斷開連線，憑證清除完畢');
        });

        function formatAviationTime(ms) {
            if (!ms) return 'N/A';
            const d = new Date(ms);
            const hh = ('0' + d.getUTCHours()).slice(-2);
            const mm = ('0' + d.getUTCMinutes()).slice(-2);
            return `${hh}${mm}Z`;
        }

        function formatAviationDate(ms) {
            if (!ms) return 'N/A';
            const d = new Date(ms);
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            const yyyy = d.getUTCFullYear();
            const mmm = months[d.getUTCMonth()];
            const dd = ('0' + d.getUTCDate()).slice(-2);
            return `${yyyy}-${mmm}-${dd}`;
        }

        function getMetaValue(docs, targetKey) {
            if (!docs || !Array.isArray(docs)) return null;
            for (let doc of docs) {
                if (doc.metadata && Array.isArray(doc.metadata)) {
                    let foundItem = doc.metadata.find(m => m.key && m.key.toLowerCase() === targetKey.toLowerCase());
                    if (foundItem) return foundItem.value;
                }
            }
            return null;
        }

        function renderRow(label, value, isHighlight = false) {
            const valColor = isHighlight ? 'text-emerald-400 font-bold' : 'text-slate-200';
            return `<div class="flex justify-between border-b border-slate-700/50 pb-1.5 pt-1.5 hover:bg-slate-800/30 px-1 rounded transition-colors">
                        <span class="text-slate-400">${label}:</span> 
                        <span class="${valColor} text-right">${value}</span>
                    </div>`;
        }

        window.copyVertProf = () => {
            const img = document.getElementById('vertprof-img');
            if (!img || !img.src) return;
            try {
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                
                canvas.toBlob(async (blob) => {
                    try {
                        await navigator.clipboard.write([
                            new ClipboardItem({ 'image/png': blob })
                        ]);
                        showToast('剖面圖已成功轉譯並複製至剪貼簿！');
                    } catch (e) {
                        showToast('安全性限制：請直接在圖片上按右鍵「複製圖片」', true, 4000);
                    }
                }, 'image/png');
            } catch (e) {
                showToast('轉譯失敗，請直接右鍵複製圖片', true);
            }
        };

        const fetchBtn = document.getElementById('fetch-data-btn');
        fetchBtn.addEventListener('click', async () => {
            let targetRaw = document.getElementById('target-flight').value.trim();
            targetRaw = targetRaw.replace(/^SJX/i, ''); 
            const target = 'SJX' + targetRaw;

            if (!savedLidoUser || !savedLidoPass || !targetRaw) return showToast('請輸入有效的航班編號', true);

            fetchBtn.disabled = true;
            document.getElementById('loading-spinner').classList.remove('hidden');
            document.getElementById('visual-dashboard').innerHTML = '<div class="flex h-full items-center justify-center text-emerald-600/50 font-mono text-base tracking-widest animate-pulse">正在穿透伺服器防線...</div>';
            document.getElementById('atc-display').value = '資料攔截中...';
            document.getElementById('copy-btn-main').classList.add('hidden');
            document.getElementById('copy-btn-atc').classList.add('hidden');

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ username: savedLidoUser, password: savedLidoPass, targetFlight: target })
                });

                const responseData = await response.json();

                if (responseData.status === 'success') {
                    const f = responseData.data;
                    const ofpData = f.ofpDetails || {};
                    const docs = ofpData.categories ? ofpData.categories : (ofpData.briefingPackages ? ofpData.briefingPackages[0].categories : []);
                    const leg = ofpData.briefingPackages && ofpData.briefingPackages[0] && ofpData.briefingPackages[0].leg ? ofpData.briefingPackages[0].leg[0] : {};
                    const rawTexts = f.rawTexts || {};

                    let atcText = '未尋獲 ATC 報文';
                    if (rawTexts['ATS']) {
                        const fplMatch = rawTexts['ATS'].match(/\(FPL-[\s\S]*?\)/);
                        if (fplMatch) atcText = fplMatch[0];
                    }
                    document.getElementById('atc-display').value = atcText;
                    if (atcText !== '未尋獲 ATC 報文') document.getElementById('copy-btn-atc').classList.remove('hidden');

                    const flightNo = (leg.commercialAirlineICAO || '') + (leg.flightNumber || '');
                    const reg = leg.aircraftDetails?.aircraftRegistration || 'N/A';
                    const dep = leg.departureAirportICAO || 'N/A';
                    const dest = leg.destinationAirportICAO || 'N/A';
                    const flightRoute = leg.flightRoute || 'N/A';
                    
                    let ofpDocs = [];
                    docs.forEach(c => { if (c.type === "OFP" && c.documents) ofpDocs = ofpDocs.concat(c.documents); });
                    const ofpNoRaw = getMetaValue(ofpDocs, 'ofpNumber') || leg.ofpNumber || '0';
                    const ofpNo = `OFP ${String(ofpNoRaw.split('/')[0]).padStart(2, '0')}`;

                    const routeParts = flightRoute.split(/\s+/);
                    const depRwy = routeParts.length > 0 ? routeParts[0] : 'N/A';
                    const destRwy = routeParts.length > 1 ? routeParts[routeParts.length - 1] : 'N/A';

                    let destAltnSet = new Set();
                    let enrouteSet = new Set();
                    let suitableSet = new Set();

                    const addAirport = (set, icao, iata) => {
                        if (icao && icao.length === 4) {
                            set.add(icao);
                            if (iata && iata.length === 3) airportMap[icao] = iata;
                        }
                    };

                    if (rawTexts['IWFR']) {
                        const iwfr = rawTexts['IWFR'];
                        
                        const extractAirports = (headerStr, set) => {
                            const regex = new RegExp(headerStr + "[^A-Z]*([\\s\\S]*?)(?=\\n[A-Z0-9\\s()]+:|$)", "i");
                            const match = iwfr.match(regex);
                            if (match) {
                                match[1].split('\n').forEach(l => {
                                    if (l.match(/^[A-Z]{4}/)) { 
                                        const m = l.match(/^([A-Z]{4})(?:\/([A-Z]{3}))?\b/);
                                        if (m) addAirport(set, m[1], m[2]);
                                    }
                                });
                            }
                        };

                        extractAirports('DESTINATION ALTERNATE[S]?', destAltnSet);
                        extractAirports('ENROUTE AIRPORT\\(S\\)', enrouteSet);
                        extractAirports('SUITABLE ENROUTE AIRPORT\\(S\\)', suitableSet);
                    }

                    if (destAltnSet.size === 0 && atcText !== '未尋獲 ATC 報文') {
                        const destAltnMatch = atcText.match(/-[A-Z]{4}\d{4}\s+([A-Z]{4})(?:\s+([A-Z]{4}))?/);
                        if (destAltnMatch) {
                            if (destAltnMatch[1]) addAirport(destAltnSet, destAltnMatch[1]);
                            if (destAltnMatch[2]) addAirport(destAltnSet, destAltnMatch[2]);
                        }
                    }
                    if (enrouteSet.size === 0 && suitableSet.size === 0 && atcText !== '未尋獲 ATC 報文') {
                        const raltMatch = atcText.match(/RALT\/([\s\S]+?)(?=\s+[A-Z]{3,4}\/|\))/);
                        if (raltMatch) {
                            raltMatch[1].trim().split(/\s+/).forEach(code => {
                                if (/^[A-Z]{4}$/.test(code) && code !== dep && code !== dest) addAirport(enrouteSet, code);
                            });
                        }
                    }

                    if (destAltnSet.size === 0 && rawTexts['OFP']) {

                    let efbVer = 'N/A';

                        if (efbMatches.length > 0) {
                            efbVer = efbMatches[efbMatches.length - 1][1];

                            const fallbackMatches = [...rawTexts['CREWINFO'].matchAll(/EFB VER[.\sA-Z0-9-]*?(R\d{3,4})/ig)];

                    showToast('機密情報截獲，儀表板已更新！');
                } else {
                    document.getElementById('visual-dashboard').innerHTML = `<div class="text-red-400 flex flex-col items-center justify-center h-full"><svg class="w-10 h-10 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>發生錯誤：<br/>${responseData.message}</div>`;
                    showToast('擷取失敗', true);
                }
            } catch (error) {
                document.getElementById('visual-dashboard').innerHTML = `<div class="text-red-400 flex flex-col items-center justify-center h-full">連線中斷：<br/>${error.message}</div>`;
                showToast('系統異常', true);
            } finally {
                fetchBtn.disabled = false;
                document.getElementById('loading-spinner').classList.add('hidden');
            }
        });

        document.getElementById('copy-btn-main').addEventListener('click', () => {
            const hiddenRaw = document.getElementById('hidden-raw-text');
            hiddenRaw.classList.remove('hidden'); 
            hiddenRaw.select();
            document.execCommand('copy');
            window.getSelection().removeAllRanges();
            hiddenRaw.classList.add('hidden'); 
            showToast('已複製勤務專屬純文字！剖面圖請另行點擊圖片上方的複製按鈕。', false, 4000);
        });

        document.getElementById('copy-btn-atc').addEventListener('click', () => {
            const display = document.getElementById('atc-display');
            display.select();
            document.execCommand('copy');
            window.getSelection().removeAllRanges();
            showToast('已複製 ATC 報文');
        });
    </script>
</body>
</html>
