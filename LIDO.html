<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人專屬 - Lido 航班精準擷取系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* 自訂捲軸樣式 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen font-sans flex items-center justify-center p-4">

    <!-- 系統訊息提示框 -->
    <div id="toast" class="fixed top-5 right-5 transform transition-transform translate-x-full opacity-0 bg-blue-600 text-white px-6 py-3 rounded shadow-lg z-50">訊息提示</div>

    <!-- 階段一：網頁鎖定畫面 -->
    <div id="lock-screen" class="w-full max-w-md glass-panel p-8 rounded-2xl shadow-2xl text-center transition-opacity duration-500">
        <svg class="w-16 h-16 mx-auto mb-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        <h2 class="text-2xl font-bold mb-6 tracking-wider">系統已鎖定</h2>
        <input type="password" id="page-password" placeholder="請輸入網頁密碼" class="w-full px-4 py-3 mb-4 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-center tracking-[0.5em]">
        <button id="unlock-btn" class="w-full px-4 py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg transition-colors">解鎖系統</button>
    </div>

    <!-- 階段二：Lido 憑證登入畫面 -->
    <div id="lido-login-screen" class="w-full max-w-md glass-panel p-8 rounded-2xl shadow-2xl text-center transition-opacity duration-500 hidden">
        <svg class="w-16 h-16 mx-auto mb-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <h2 class="text-2xl font-bold mb-6 tracking-wider">Lido 伺服器驗證</h2>
        <p class="text-sm text-slate-400 mb-6">請輸入 Lido 帳密，系統將於背景保持連線狀態。</p>
        <input type="text" id="lido-user" class="w-full px-4 py-3 mb-4 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-center" placeholder="Username">
        <input type="password" id="lido-pass" class="w-full px-4 py-3 mb-6 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-center" placeholder="Password">
        <button id="lido-connect-btn" class="w-full px-4 py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-lg transition-colors">建立背景連線</button>
    </div>

    <!-- 階段三：主程式戰情室 -->
    <div id="main-app" class="w-full max-w-5xl glass-panel p-6 md:p-8 rounded-2xl shadow-2xl transition-opacity duration-500 hidden">
        <div class="flex items-center justify-between mb-6 border-b border-slate-700 pb-4">
            <h1 class="text-2xl font-bold flex items-center text-blue-400">Lido 航班戰情室</h1>
            <button id="lock-again-btn" class="text-sm text-slate-400 hover:text-white transition-colors">清除憑證並鎖定</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            <!-- 左側：目標鎖定區 -->
            <div class="space-y-5 md:col-span-4 border-b md:border-b-0 md:border-r border-slate-700 pb-6 md:pb-0 md:pr-6 flex flex-col justify-start">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">目標航班號</label>
                    <div class="flex">
                        <span class="inline-flex items-center px-4 text-sm text-slate-400 bg-slate-700 border border-r-0 border-slate-700 rounded-l-lg font-bold">SJX</span>
                        <input type="text" id="target-flight" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-r-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-emerald-400 font-bold text-lg tracking-wider" placeholder="例如: 805">
                    </div>
                    <p class="text-xs text-slate-500 mt-2">憑證已載入，輸入號碼即可連續查詢。</p>
                </div>
                
                <button id="fetch-data-btn" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-lg shadow-lg transition-colors flex items-center justify-center mt-auto">
                    <span>發動精準擷取</span>
                    <svg id="loading-spinner" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
            </div>

            <!-- 右側：結果顯示區 -->
            <div class="md:col-span-8 flex flex-col space-y-4">
                
                <!-- 第一個區塊：結構化 OFP -->
                <div class="flex-grow flex flex-col h-64 md:h-80">
                    <label class="block text-sm font-medium text-slate-400 mb-1 flex justify-between">
                        <span>OFP 核心數據</span>
                    </label>
                    <div class="relative flex-grow">
                        <textarea id="result-display" readonly class="w-full h-full p-4 bg-slate-950 border border-slate-700 rounded-lg text-emerald-400 font-mono text-sm focus:outline-none resize-none leading-relaxed" placeholder="等待目標輸入..."></textarea>
                        <button id="copy-btn-main" class="absolute top-2 right-2 p-2 bg-slate-800 hover:bg-emerald-600 text-slate-300 hover:text-white rounded shadow transition-colors hidden" title="複製此區塊">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        </button>
                    </div>
                </div>

                <!-- 第二個區塊：ATC Flight Plan -->
                <div class="flex-grow flex flex-col h-32 md:h-40">
                    <label class="block text-sm font-medium text-slate-400 mb-1 flex justify-between">
                        <span>ATC Flight Plan (FPL)</span>
                    </label>
                    <div class="relative flex-grow">
                        <textarea id="atc-display" readonly class="w-full h-full p-4 bg-slate-950 border border-slate-700 rounded-lg text-blue-300 font-mono text-sm focus:outline-none resize-none leading-relaxed" placeholder="ATC 報文將顯示於此..."></textarea>
                        <button id="copy-btn-atc" class="absolute top-2 right-2 p-2 bg-slate-800 hover:bg-blue-600 text-slate-300 hover:text-white rounded shadow transition-colors hidden" title="複製 ATC 報文">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const getSecKey = () => [49, 48, 52, 55, 56, 56].map(c => String.fromCharCode(c)).join('');
        // ★ 請保留您的 GAS 部署網址 ★
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwXYpCVHhPi5w5pejBndNN8mKZ4VtveLhgIEVbzCKwiFuKebwH6Re2j58UbPHdL00Z2Vg/exec'; 

        let savedLidoUser = '';
        let savedLidoPass = '';

        const lockScreen = document.getElementById('lock-screen');
        const lidoLoginScreen = document.getElementById('lido-login-screen');
        const mainApp = document.getElementById('main-app');
        const pagePwdInput = document.getElementById('page-password');
        const toast = document.getElementById('toast');

        function showToast(msg, isError = false) {
            toast.textContent = msg;
            toast.className = `fixed top-5 right-5 transform transition-transform duration-300 shadow-lg z-50 px-6 py-3 rounded text-white ${isError ? 'bg-red-600' : 'bg-blue-600'}`;
            toast.classList.remove('translate-x-full', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-x-full', 'opacity-0'), 3000);
        }

        function attemptUnlock() {
            if (pagePwdInput.value === getSecKey()) {
                lockScreen.classList.add('hidden');
                lidoLoginScreen.classList.remove('hidden');
                pagePwdInput.value = '';
            } else {
                showToast('密碼錯誤', true);
            }
        }
        document.getElementById('unlock-btn').addEventListener('click', attemptUnlock);
        pagePwdInput.addEventListener('keypress', e => { if (e.key === 'Enter') attemptUnlock(); });

        document.getElementById('lido-connect-btn').addEventListener('click', () => {
            const user = document.getElementById('lido-user').value.trim();
            const pass = document.getElementById('lido-pass').value.trim();
            if (!user || !pass) return showToast('請完整輸入 Lido 帳號與密碼', true);
            
            savedLidoUser = user;
            savedLidoPass = pass;
            lidoLoginScreen.classList.add('hidden');
            mainApp.classList.remove('hidden');
            showToast('憑證已暫存，請開始查詢航班');
        });

        document.getElementById('lock-again-btn').addEventListener('click', () => {
            savedLidoUser = '';
            savedLidoPass = '';
            document.getElementById('lido-user').value = '';
            document.getElementById('lido-pass').value = '';
            mainApp.classList.add('hidden');
            lockScreen.classList.remove('hidden');
            document.getElementById('result-display').value = '';
            document.getElementById('atc-display').value = '';
            document.getElementById('copy-btn-main').classList.add('hidden');
            document.getElementById('copy-btn-atc').classList.add('hidden');
            showToast('系統已鎖定，憑證已銷毀');
        });

        function formatAviationTime(ms) {
            if (!ms) return 'N/A';
            const d = new Date(ms);
            const hh = ('0' + d.getUTCHours()).slice(-2);
            const mm = ('0' + d.getUTCMinutes()).slice(-2);
            return `${hh}${mm}Z`;
        }

        function getMetaValue(docs, targetKey) {
            if (!docs || !Array.isArray(docs)) return null;
            for (let doc of docs) {
                if (doc.metadata && Array.isArray(doc.metadata)) {
                    let foundItem = doc.metadata.find(m => m.key && m.key.toLowerCase() === targetKey.toLowerCase());
                    if (foundItem) return foundItem.value;
                }
            }
            return null;
        }

        const fetchBtn = document.getElementById('fetch-data-btn');
        fetchBtn.addEventListener('click', async () => {
            let targetRaw = document.getElementById('target-flight').value.trim();
            targetRaw = targetRaw.replace(/^SJX/i, ''); 
            const target = 'SJX' + targetRaw;

            if (!savedLidoUser || !savedLidoPass || !targetRaw) return showToast('請完整輸入資料。', true);

            fetchBtn.disabled = true;
            document.getElementById('loading-spinner').classList.remove('hidden');
            document.getElementById('result-display').value = '連線中，正在攔截並分析機密文件...';
            document.getElementById('atc-display').value = '等待資料...';
            document.getElementById('copy-btn-main').classList.add('hidden');
            document.getElementById('copy-btn-atc').classList.add('hidden');

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ username: savedLidoUser, password: savedLidoPass, targetFlight: target })
                });

                const responseData = await response.json();

                if (responseData.status === 'success') {
                    const f = responseData.data;
                    const ofpData = f.ofpDetails || {};
                    const docs = ofpData.categories ? ofpData.categories : (ofpData.briefingPackages ? ofpData.briefingPackages[0].categories : []);
                    const leg = ofpData.briefingPackages && ofpData.briefingPackages[0] && ofpData.briefingPackages[0].leg ? ofpData.briefingPackages[0].leg[0] : {};
                    const rawTexts = f.rawTexts || {};

                    // ==============================================
                    // 1. ATC Flight Plan 擷取區塊
                    // ==============================================
                    let atcText = '未尋獲 ATC 報文';
                    if (rawTexts['ATS']) {
                        const fplMatch = rawTexts['ATS'].match(/\(FPL-[\s\S]*?\)/);
                        if (fplMatch) atcText = fplMatch[0];
                    }
                    document.getElementById('atc-display').value = atcText;
                    if (atcText !== '未尋獲 ATC 報文') document.getElementById('copy-btn-atc').classList.remove('hidden');

                    // ==============================================
                    // 2. OFP 核心數據解譯區塊
                    // ==============================================
                    const flightNo = (leg.commercialAirlineICAO || '') + (leg.flightNumber || '');
                    const reg = leg.aircraftDetails?.aircraftRegistration || 'N/A';
                    const dep = leg.departureAirportICAO || 'N/A';
                    const dest = leg.destinationAirportICAO || 'N/A';
                    const flightRoute = leg.flightRoute || 'N/A';
                    
                    let ofpDocs = [];
                    docs.forEach(c => { if (c.type === "OFP" && c.documents) ofpDocs = ofpDocs.concat(c.documents); });
                    const ofpNoRaw = getMetaValue(ofpDocs, 'ofpNumber') || leg.ofpNumber || '0';
                    const ofpNo = `OFP ${String(ofpNoRaw.split('/')[0]).padStart(2, '0')}`;

                    const stdStr = formatAviationTime(leg.scheduledDepartureTime);
                    const staStr = formatAviationTime(leg.scheduledTimeOfArrival);
                    const etdStr = formatAviationTime(leg.estimatedDepartureTime);
                    const tripMins = leg.fuel?.totalTripTimeMinutes || 0;
                    const eteStr = tripMins ? `${('0' + Math.floor(tripMins/60)).slice(-2)}.${('0' + (tripMins%60)).slice(-2)}` : 'N/A';

                    const zfw = leg.weight?.plannedZfw || 0;
                    const tkofFuel = leg.fuel?.takeOffFuel || 0;
                    const tripFuel = leg.fuel?.tripFuel || 0;
                    const tow = zfw > 0 ? ((zfw + tkofFuel) / 1000).toFixed(1) : 'N/A';
                    const ldw = zfw > 0 ? ((zfw + tkofFuel - tripFuel) / 1000).toFixed(1) : 'N/A';

                    let efbVer = 'N/A';
                    if (rawTexts['CREWINFO']) {
                        const efbMatches = [...rawTexts['CREWINFO'].matchAll(/EFB VER[.\sA-Z0-9-]*?(R\d{3,4})/ig)];
                        if (efbMatches.length > 0) efbVer = efbMatches[efbMatches.length - 1][1]; 
                    }

                    // 航空油量精算變數與氣象解析
                    let wc = 'N/A', mxsh = 'N/A', tocAlt = 'N/A', nextWptTemp = 'N/A';
                    let totalFuel = 'N/A', divFuelCalc = 'N/A', spareFuelCalc = 'N/A';

                    if (rawTexts['OFP']) {
                        const ofpText = rawTexts['OFP'];
                        const ofpLines = ofpText.split('\n');
                        
                        // -- 氣象與導航資料擷取 --
                        const wcMatch = ofpText.match(/W\/C\s+([A-Z0-9]+)/);
                        if (wcMatch) wc = wcMatch[1];
                        
                        const mxshMatch = ofpText.match(/MXSH\s+([A-Z0-9\/]+)/);
                        if (mxshMatch) {
                            mxsh = mxshMatch[1];
                            const mxshParts = mxsh.split('/');
                            if (mxshParts.length > 1) {
                                const wptName = mxshParts[1].trim();
                                const wptRegex = new RegExp(`\\b${wptName}\\b[\\s\\S]{0,300}?\\.{2,}\\s*(\\d{4})`);
                                const atgoMatch = ofpText.match(wptRegex);
                                if (atgoMatch) {
                                    mxsh += ` ATGO ${atgoMatch[1]}`;
                                } else {
                                    const fallbackRegex = new RegExp(`\\b${wptName}\\b[\\s\\S]{0,300}?\\n\\s*0\\d{3}\\b`);
                                    const fbMatch = ofpText.match(fallbackRegex);
                                    if (fbMatch) mxsh += ` ATGO ${fbMatch[1].trim()}`;
                                }
                            }
                        }

                        let tocIndex = ofpLines.findIndex(l => /\bT_?O_?C\b/.test(l));
                        if (tocIndex !== -1) {
                            const altMatch = ofpLines[tocIndex].match(/\b([2-4]\d{2})\b/);
                            if (altMatch) tocAlt = 'FL' + altMatch[1];

                            const textAfterTOC = ofpText.substring(ofpText.indexOf(ofpLines[tocIndex]));
                            const tempMatches = [...textAfterTOC.matchAll(/\b([MP]\d{2})(?:\/\d{2})?\b/g)];
                            if (tempMatches.length > 1) {
                                nextWptTemp = tempMatches[1][1]; 
                                const textUpToTemp = textAfterTOC.substring(0, tempMatches[1].index);
                                const wptMatches = [...textUpToTemp.matchAll(/\b([A-Z]{3,5})\b/g)];
                                if (wptMatches.length > 0) {
                                    const validWpts = wptMatches.filter(m => m[1] !== 'TOC' && !m[1].match(/^[A-Z]\d+$/));
                                    if(validWpts.length > 0) nextWptTemp = `${validWpts[validWpts.length - 1][1]} ${nextWptTemp}`;
                                }
                            }
                        }

                        // -- 航空油量精算引擎 --
                        const getFuel = (regex) => {
                            const m = ofpText.match(regex);
                            return m ? parseInt(m[1], 10) : 0;
                        };

                        const f_total = getFuel(/TOTAL\s+(\d+)/);
                        if (f_total > 0) totalFuel = f_total;

                        const f_altn = getFuel(/ALTN(?:\s+[A-Z0-9]{3,4})?\s+(\d+)/);
                        const f_frf = getFuel(/FINAL RES\s+(\d+)/);
                        divFuelCalc = `${f_altn} + ${f_frf} = ${f_altn + f_frf}`;

                        const f_addWxx = getFuel(/ADD WXX\s+(\d+)/);
                        const f_addOpn = getFuel(/ADD OPN\s+(\d+)/);
                        const f_addAtc = getFuel(/ADD ATC\s+(\d+)/);
                        const f_addDev = getFuel(/ADD DEV\s+(\d+)/);
                        const f_cont = getFuel(/CONT\s+(\d+)/);
                        const f_crit = getFuel(/CRIT FUEL\s+(\d+)/);
                        const f_tank = getFuel(/TANKERING\s+(\d+)/);
                        const f_extra = getFuel(/EXTRA\s+(\d+)/);

                        const f_spare = f_addWxx + f_addOpn + f_addAtc + f_addDev + f_cont + f_crit + f_tank + f_extra;
                        spareFuelCalc = f_spare.toString();
                    }

                    let raimOutage = 'RAIM not satisfied', raimSatellites = 'N/A';
                    if (rawTexts['RAIM']) {
                        if (rawTexts['RAIM'].includes('THERE ARE NO RAIM OUTAGES FOR THE PLANNED APPROACHES')) {
                            raimOutage = 'THERE ARE NO RAIM OUTAGES FOR THE PLANNED APPROACHES';
                        }
                        const satMatch = rawTexts['RAIM'].match(/MINIMUM NUMBER OF HEALTHY SATELLITES.*?(\d+)/i);
                        if (satMatch) raimSatellites = satMatch[1];
                    }

                    // ==============================================
                    // 3. 組合主結構化文字區塊
                    // ==============================================
                    let block = `Flight number: ${flightNo}\n`;
                    block += `機號: ${reg}\n`;
                    block += `出發地/目的地: ${dep}/${dest}\n`;
                    block += `Route: ${flightRoute}\n`;
                    block += `OFP 號碼: ${ofpNo}\n`;
                    block += `EFB 版本: ${efbVer}\n`;
                    block += `STD: ${stdStr}\n`;
                    block += `STA: ${staStr}\n`;
                    block += `ETD: ${etdStr}\n`;
                    block += `ETE: ${eteStr}\n`;
                    block += `W/C: ${wc}\n`;
                    block += `MXSH: ${mxsh}\n`;
                    block += `TOW: ${tow}\n`;
                    block += `LDW: ${ldw}\n`;
                    block += `Total Fuel: ${totalFuel}\n`;
                    block += `Division Fuel (ALTN+FRF): ${divFuelCalc}\n`;
                    block += `SPARE Fuel: ${spareFuelCalc}\n`;
                    block += `TOC 高度: ${tocAlt}\n`;
                    block += `TOC 下個航點溫度: ${nextWptTemp}\n`;
                    block += `RAIM Outages: ${raimOutage}\n`;
                    block += `RAIM Healthy Satellites: ${raimSatellites}\n`;
                    block += `------------------------------------------------------\n`;

                    document.getElementById('result-display').value = block;
                    document.getElementById('copy-btn-main').classList.remove('hidden');
                    showToast('機密資料萃取與精算完畢！');
                } else {
                    document.getElementById('result-display').value = '發生錯誤：\n' + responseData.message;
                    showToast('擷取失敗', true);
                }
            } catch (error) {
                document.getElementById('result-display').value = '連線失敗：' + error.message;
                showToast('系統異常', true);
            } finally {
                fetchBtn.disabled = false;
                document.getElementById('loading-spinner').classList.add('hidden');
            }
        });

        // 複製按鈕綁定 (主區塊)
        document.getElementById('copy-btn-main').addEventListener('click', () => {
            const display = document.getElementById('result-display');
            display.select();
            document.execCommand('copy');
            window.getSelection().removeAllRanges();
            showToast('已複製主結構化文字區塊');
        });

        // 複製按鈕綁定 (ATC 區塊)
        document.getElementById('copy-btn-atc').addEventListener('click', () => {
            const display = document.getElementById('atc-display');
            display.select();
            document.execCommand('copy');
            window.getSelection().removeAllRanges();
            showToast('已複製 ATC 報文');
        });
    </script>
</body>
</html>
